name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
      - run: python -m cisco_insights.cli bootstrap --accounts 20 --assets 500 --seed 7
      - run: python -m cisco_insights.cli validate
